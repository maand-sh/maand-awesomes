groups:
  # ── Availability ─────────────────────────────────────────────────────────────
  - name: zookeeper_availability
    rules:
      - alert: zookeeper metrics down
        expr: up{maand_job="zookeeper"} == 0
        for: 5m
        labels:
          maand_job: zookeeper
          severity: critical
        annotations:
          summary: "[{{ $labels.maand_job }}] metrics down on {{ $labels.instance }}"
          description: "prometheus cannot scrape zookeeper /metrics on {{ $labels.instance }} for more than 5 minutes"
          runbook: zookeeper_metrics_down

      - alert: zookeeper quorum at risk
        expr: count(up{maand_job="zookeeper"} == 1) < 2
        for: 5m
        labels:
          maand_job: zookeeper
          severity: critical
        annotations:
          summary: "[{{ $labels.maand_job }}] quorum at risk"
          description: "fewer than 2 zookeeper nodes are reachable ({{ $value }} up)"
          runbook: zookeeper_quorum_at_risk

  # ── Performance ──────────────────────────────────────────────────────────────
  - name: zookeeper_performance
    rules:
      - alert: zookeeper avg latency high
        expr: zookeeper_avg_latency > 100
        for: 5m
        labels:
          maand_job: zookeeper
          severity: warning
        annotations:
          summary: "[{{ $labels.maand_job }}] avg latency high on {{ $labels.instance }}"
          description: "average request latency is {{ $value | printf \"%.0f\" }} ms (instance {{ $labels.instance }})"
          runbook: zookeeper_latency_high

      - alert: zookeeper fsync slow
        expr: rate(zookeeper_fsynctime_sum[1m]) > 100
        for: 5m
        labels:
          maand_job: zookeeper
          severity: warning
        annotations:
          summary: "[{{ $labels.maand_job }}] fsync slow on {{ $labels.instance }}"
          description: "fsync time rate is {{ $value | printf \"%.0f\" }} (instance {{ $labels.instance }})"
          runbook: zookeeper_latency_high

      - alert: zookeeper snapshot slow
        expr: rate(zookeeper_snapshottime_sum[5m]) > 100
        for: 5m
        labels:
          maand_job: zookeeper
          severity: warning
        annotations:
          summary: "[{{ $labels.maand_job }}] snapshot slow on {{ $labels.instance }}"
          description: "snapshot time rate is {{ $value | printf \"%.0f\" }} (instance {{ $labels.instance }})"
          runbook: zookeeper_latency_high

  # ── Resources ────────────────────────────────────────────────────────────────
  - name: zookeeper_resources
    rules:
      - alert: zookeeper connections high
        expr: zookeeper_num_alive_connections > 200
        for: 10m
        labels:
          maand_job: zookeeper
          severity: warning
        annotations:
          summary: "[{{ $labels.maand_job }}] connections high on {{ $labels.instance }}"
          description: "{{ $value | printf \"%.0f\" }} client connections (maxClientCnxns=256) on {{ $labels.instance }}"
          runbook: zookeeper_connections_high

      - alert: zookeeper open files high
        expr: zookeeper_open_file_descriptor_count > 300
        for: 10m
        labels:
          maand_job: zookeeper
          severity: warning
        annotations:
          summary: "[{{ $labels.maand_job }}] open file descriptors high on {{ $labels.instance }}"
          description: "{{ $value | printf \"%.0f\" }} open file descriptors on {{ $labels.instance }}"
          runbook: zookeeper_connections_high

      - alert: zookeeper jvm memory high
        expr: zookeeper_jvm_memory_bytes_used / zookeeper_jvm_memory_bytes_max{area="heap"} > 0.85
        for: 5m
        labels:
          maand_job: zookeeper
          severity: warning
        annotations:
          summary: "[{{ $labels.maand_job }}] JVM heap high on {{ $labels.instance }}"
          description: "JVM heap usage is {{ $value | humanizePercentage }} on {{ $labels.instance }}"
          runbook: zookeeper_jvm_memory_high

  # ── Data & quorum events ─────────────────────────────────────────────────────
  - name: zookeeper_data
    rules:
      - alert: zookeeper leader election
        expr: increase(zookeeper_election_time_count[5m]) > 0
        for: 0m
        labels:
          maand_job: zookeeper
          severity: warning
        annotations:
          summary: "[{{ $labels.maand_job }}] leader election on {{ $labels.instance }}"
          description: "a leader election occurred on {{ $labels.instance }}"
          runbook: zookeeper_leader_election

      - alert: zookeeper znode count high
        expr: zookeeper_znode_count > 1000000
        for: 10m
        labels:
          maand_job: zookeeper
          severity: warning
        annotations:
          summary: "[{{ $labels.maand_job }}] znode count high on {{ $labels.instance }}"
          description: "{{ $value | printf \"%.0f\" }} znodes on {{ $labels.instance }}"
          runbook: zookeeper_data_growth

      - alert: zookeeper data size high
        expr: zookeeper_approximate_data_size / 1024 / 1024 > 1024
        for: 10m
        labels:
          maand_job: zookeeper
          severity: warning
        annotations:
          summary: "[{{ $labels.maand_job }}] data size high on {{ $labels.instance }}"
          description: "approximate data size is {{ $value | printf \"%.0f\" }} MB on {{ $labels.instance }}"
          runbook: zookeeper_data_growth

      - alert: zookeeper watch count high
        expr: zookeeper_watch_count > 10000
        for: 10m
        labels:
          maand_job: zookeeper
          severity: warning
        annotations:
          summary: "[{{ $labels.maand_job }}] watch count high on {{ $labels.instance }}"
          description: "{{ $value | printf \"%.0f\" }} watches on {{ $labels.instance }}"
          runbook: zookeeper_data_growth
