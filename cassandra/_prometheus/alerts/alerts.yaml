groups:
  # ── Availability ─────────────────────────────────────────────────────────────
  - name: cassandra_availability
    rules:
      - alert: cassandra metrics down
        expr: up{maand_job="cassandra"} == 0
        for: 5m
        labels:
          maand_job: cassandra
          severity: critical
        annotations:
          summary: "[{{ $labels.maand_job }}] metrics endpoint down on {{ $labels.instance }}"
          description: "Prometheus cannot scrape {{ $labels.instance }} for more than 5 minutes"
          runbook: job_down

  # ── Errors ───────────────────────────────────────────────────────────────────
  - name: cassandra_errors
    rules:
      - alert: cassandra storage exceptions
        expr: rate(cassandra_storage_exceptions{maand_job="cassandra"}[5m]) > 0
        for: 5m
        labels:
          maand_job: cassandra
          severity: warning
        annotations:
          summary: "[{{ $labels.maand_job }}] storage exceptions on {{ $labels.instance }}"
          description: "storage exceptions are occurring at {{ $value | printf \"%.2f\" }}/s (instance {{ $labels.instance }})"
          runbook: storage_exceptions

      - alert: cassandra connection timeouts
        expr: rate(cassandra_connection_timeouts{maand_job="cassandra"}[5m]) > 0
        for: 5m
        labels:
          maand_job: cassandra
          severity: warning
        annotations:
          summary: "[{{ $labels.maand_job }}] connection timeouts on {{ $labels.instance }}"
          description: "JMX/client connection timeouts at {{ $value | printf \"%.2f\" }}/s (instance {{ $labels.instance }})"
          runbook: connection_timeouts

      - alert: cassandra dropped messages
        expr: rate(cassandra_droppedmessage_dropped{maand_job="cassandra"}[5m]) > 0
        for: 5m
        labels:
          maand_job: cassandra
          severity: warning
        annotations:
          summary: "[{{ $labels.maand_job }}] dropped messages on {{ $labels.instance }}"
          description: "internal messages are being dropped at {{ $value | printf \"%.2f\" }}/s (instance {{ $labels.instance }})"
          runbook: dropped_messages

  # ── Compaction ───────────────────────────────────────────────────────────────
  - name: cassandra_compaction
    rules:
      - alert: cassandra pending compactions high
        expr: max by(instance, maand_job) (cassandra_keyspace_pendingcompactions{maand_job="cassandra"}) > 50
        for: 15m
        labels:
          maand_job: cassandra
          severity: warning
        annotations:
          summary: "[{{ $labels.maand_job }}] high pending compactions on {{ $labels.instance }}"
          description: "{{ $value | printf \"%.0f\" }} pending compactions (instance {{ $labels.instance }})"
          runbook: pending_compactions

  # ── Latency ──────────────────────────────────────────────────────────────────
  - name: cassandra_latency
    rules:
      - alert: cassandra high read latency
        expr: |
          cassandra_clientrequest_latency_seconds{maand_job="cassandra",scope="Read",quantile="0.99"} > 0.5
        for: 10m
        labels:
          maand_job: cassandra
          severity: warning
        annotations:
          summary: "[{{ $labels.maand_job }}] high read latency on {{ $labels.instance }}"
          description: "p99 read latency is {{ $value | humanizeDuration }} (instance {{ $labels.instance }})"
          runbook: high_latency

      - alert: cassandra high write latency
        expr: |
          cassandra_clientrequest_latency_seconds{maand_job="cassandra",scope="Write",quantile="0.99"} > 0.5
        for: 10m
        labels:
          maand_job: cassandra
          severity: warning
        annotations:
          summary: "[{{ $labels.maand_job }}] high write latency on {{ $labels.instance }}"
          description: "p99 write latency is {{ $value | humanizeDuration }} (instance {{ $labels.instance }})"
          runbook: high_latency

  # ── Thread pools ─────────────────────────────────────────────────────────────
  - name: cassandra_threadpools
    rules:
      - alert: cassandra thread pool blocked
        expr: cassandra_threadpools_currentlyblockedtasks{maand_job="cassandra"} > 0
        for: 5m
        labels:
          maand_job: cassandra
          severity: warning
        annotations:
          summary: "[{{ $labels.maand_job }}] thread pool blocked on {{ $labels.instance }}"
          description: "thread pool {{ $labels.path }} has {{ $value | printf \"%.0f\" }} blocked tasks (instance {{ $labels.instance }})"
          runbook: thread_pool_blocked
