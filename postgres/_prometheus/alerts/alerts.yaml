groups:
  # ── Availability ─────────────────────────────────────────────────────────────
  - name: postgres_availability
    rules:
      - alert: postgres exporter down
        expr: pg_up == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "postgres exporter down on {{ $labels.instance }}"
          description: "postgres_exporter cannot reach the database on {{ $labels.instance }} for more than 5 minutes"
          runbook: postgres_exporter_down

  # ── Replication ──────────────────────────────────────────────────────────────
  - name: postgres_replication
    rules:
      - alert: postgres replication lag
        expr: pg_stat_replication_lag > 60
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "postgres replication lag on {{ $labels.instance }}"
          description: "replication lag is {{ $value | printf \"%.0f\" }}s on {{ $labels.application_name }} (instance {{ $labels.instance }})"
          runbook: postgres_replication_lag

      - alert: postgres replication stalled
        expr: pg_stat_replication_lag > 300
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "postgres replication stalled on {{ $labels.instance }}"
          description: "replication lag is {{ $value | printf \"%.0f\" }}s on {{ $labels.application_name }} (instance {{ $labels.instance }})"
          runbook: postgres_replication_lag

  # ── Connections ──────────────────────────────────────────────────────────────
  - name: postgres_connections
    rules:
      - alert: postgres connections high
        expr: |
          sum by (instance) (pg_stat_activity_count)
            / on(instance) pg_settings_max_connections * 100 > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "postgres connections above 85% on {{ $labels.instance }}"
          description: "connection usage is {{ $value | printf \"%.1f\" }}% of max_connections (instance {{ $labels.instance }})"
          runbook: postgres_connections_high

      - alert: postgres connections critical
        expr: |
          sum by (instance) (pg_stat_activity_count)
            / on(instance) pg_settings_max_connections * 100 > 95
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "postgres connections above 95% on {{ $labels.instance }}"
          description: "connection usage is {{ $value | printf \"%.1f\" }}% of max_connections (instance {{ $labels.instance }})"
          runbook: postgres_connections_high

  # ── Database health ──────────────────────────────────────────────────────────
  - name: postgres_database
    rules:
      - alert: postgres deadlocks
        expr: rate(pg_stat_database_deadlocks[5m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "postgres deadlocks on {{ $labels.instance }}"
          description: "database {{ $labels.datname }} is deadlocking at {{ $value | printf \"%.2f\" }}/s (instance {{ $labels.instance }})"
          runbook: postgres_deadlocks

      - alert: postgres exporter scrape errors
        expr: rate(pg_exporter_last_scrape_error[5m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "postgres exporter scrape errors on {{ $labels.instance }}"
          description: "postgres_exporter is failing to scrape {{ $labels.instance }}"
          runbook: postgres_exporter_down
